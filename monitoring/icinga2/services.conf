// Icinga2 Service Definitions — Odoo Production Stack
//
// Purpose: Service apply rules and ServiceGroup for Odoo custom monitoring.
// Deployment: Copy to /etc/icinga2/zones.d/master/ on the Icinga2 master.
//
// Prerequisites:
//   - CheckCommand definitions from commands.conf deployed to global-templates
//   - Host object with vars.odoo_host = true and vars.agent_endpoint set
//   - Custom plugins installed on the agent host
//
// Placeholders:
//   The host object below (commented out) contains placeholders you must
//   customize for your environment. Search for "PLACEHOLDER" markers.
//
// Requirement: MON-05 (Service definitions)


// ---------------------------------------------------------------------------
// ServiceGroup: odoo-production
// Groups all Odoo-specific checks for dashboard organisation.
// ---------------------------------------------------------------------------
object ServiceGroup "odoo-production" {
  display_name = "Odoo Production Stack"
}


// ---------------------------------------------------------------------------
// Service: docker-stack
// Monitors Docker container health on the Odoo host.
// Executed on the agent via command_endpoint.
// ---------------------------------------------------------------------------
apply Service "docker-stack" {
  check_command = "docker-stack"

  // Execute the check on the agent, not the master
  command_endpoint = host.vars.agent_endpoint

  check_interval = 5m
  retry_interval = 1m
  max_check_attempts = 3

  groups = [ "odoo-production" ]

  // Apply to any host flagged as an Odoo host
  assign where host.vars.odoo_host == true
}


// ---------------------------------------------------------------------------
// Service: postgres-health
// Monitors PostgreSQL metrics on the Odoo host via docker exec.
// Executed on the agent via command_endpoint.
// ---------------------------------------------------------------------------
apply Service "postgres-health" {
  check_command = "postgres-health"

  // Execute the check on the agent, not the master
  command_endpoint = host.vars.agent_endpoint

  check_interval = 5m
  retry_interval = 1m
  max_check_attempts = 3

  groups = [ "odoo-production" ]

  // Apply to any host flagged as an Odoo host
  assign where host.vars.odoo_host == true
}


