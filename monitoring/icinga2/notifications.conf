// Icinga2 Notification Definitions — Odoo Production Stack
//
// Purpose: Example notification apply rules using Icinga2's built-in
//          mail-service-notification command. These route alerts for the
//          odoo-production service group to the designated admin(s).
//
// Deployment: Copy to /etc/icinga2/zones.d/master/ on the Icinga2 master.
//
// Prerequisites:
//   - Working mail setup on the master (postfix, msmtp, or similar)
//   - Icinga2's built-in notification commands enabled:
//     include <plugins-notification-contrib>    (usually in icinga2.conf)
//   - The "24x7" TimePeriod object (ships with Icinga2 by default)
//
// Placeholders:
//   Search for "PLACEHOLDER" and replace with your values.
//
// Requirement: MON-05 (Service definitions)


// ---------------------------------------------------------------------------
// User: odoo-admin
// Example user for receiving Odoo alerts. Customize or replace with your
// existing user objects.
// ---------------------------------------------------------------------------
object User "odoo-admin" {
  display_name = "Odoo Administrator"
  email = "ADMIN_EMAIL_PLACEHOLDER"            /* PLACEHOLDER: Replace with admin email */
  groups = [ "odoo-admins" ]

  // Receive these notification states
  states = [ Warning, Critical, Unknown ]
  types = [ Problem, Recovery ]
}


// ---------------------------------------------------------------------------
// UserGroup: odoo-admins
// Group for all Odoo alert recipients. Add additional users to this group
// to receive notifications.
// ---------------------------------------------------------------------------
object UserGroup "odoo-admins" {
  display_name = "Odoo Administrators"
}


// ---------------------------------------------------------------------------
// Notification: odoo-mail-service
// Routes service alerts for the odoo-production group to odoo-admins via
// Icinga2's built-in mail-service-notification command.
//
// The built-in command handles OS-specific mail binary detection (mailx vs
// mail) and HTML formatting automatically.
// ---------------------------------------------------------------------------
apply Notification "odoo-mail-service" to Service {
  command = "mail-service-notification"

  // Recipients — customize user or switch to user_groups for teams
  users = [ "odoo-admin" ]                     /* Customize: add users or use user_groups */

  // Alert on these states
  states = [ Warning, Critical, Unknown ]
  types = [ Problem, Recovery ]

  // When to send — adjust if you only want business-hours alerts
  period = "24x7"                              /* Adjust: e.g., "business-hours" if defined */

  // Scope to Odoo production services only
  assign where "odoo-production" in service.groups
}
