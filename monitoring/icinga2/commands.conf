// Icinga2 CheckCommand Definitions — Odoo Production Stack
//
// Purpose: CheckCommand objects for the custom Docker and PostgreSQL check plugins.
// Deployment: Copy to /etc/icinga2/zones.d/global-templates/ on the Icinga2 master.
//             Global templates are automatically synced to all agents.
//
// Prerequisites:
//   - Custom plugins installed on the agent host at CustomPluginDir
//   - nagios user added to the docker group on the agent host
//
// Requirements: MON-02 (Docker health), MON-03 (PostgreSQL health)

// Custom plugin directory on the agent host.
/* PLACEHOLDER: Adjust path if your agent uses a different plugin directory */
const CustomPluginDir = "/usr/lib/nagios/plugins/custom"


// ---------------------------------------------------------------------------
// CheckCommand: docker-stack
// Monitors Docker container health, running state, and restart counts.
// Plugin: check_docker_stack (bash, uses docker inspect)
// ---------------------------------------------------------------------------
object CheckCommand "docker-stack" {
  command = [ CustomPluginDir + "/check_docker_stack" ]

  arguments = {
    "--containers" = {
      value = "$docker_stack_containers$"
      description = "Comma-separated container names to check"
    }
    "--warn-restarts" = {
      value = "$docker_stack_warn_restarts$"
      description = "Restart count warning threshold"
    }
    "--crit-restarts" = {
      value = "$docker_stack_crit_restarts$"
      description = "Restart count critical threshold"
    }
  }

  // Defaults — override via host or service custom vars
  vars.docker_stack_containers = "odoo-app,odoo-db"
  vars.docker_stack_warn_restarts = 2
  vars.docker_stack_crit_restarts = 5
}


// ---------------------------------------------------------------------------
// CheckCommand: postgres-health
// Monitors PostgreSQL connections, database size, query latency, and cache
// hit ratio via docker exec into the PostgreSQL container.
// Plugin: check_postgres_health (bash, uses docker exec + psql)
// ---------------------------------------------------------------------------
object CheckCommand "postgres-health" {
  command = [ CustomPluginDir + "/check_postgres_health" ]

  arguments = {
    "--container" = {
      value = "$postgres_health_container$"
      description = "PostgreSQL Docker container name"
    }
    "--pg-user" = {
      value = "$postgres_health_user$"
      description = "PostgreSQL user for queries"
    }
    "--pg-db" = {
      value = "$postgres_health_db$"
      description = "PostgreSQL database name"
    }
    "--warn-conn" = {
      value = "$postgres_health_warn_conn$"
      description = "Connection count warning threshold"
    }
    "--crit-conn" = {
      value = "$postgres_health_crit_conn$"
      description = "Connection count critical threshold"
    }
    "--warn-size" = {
      value = "$postgres_health_warn_size$"
      description = "Database size warning threshold (bytes)"
    }
    "--crit-size" = {
      value = "$postgres_health_crit_size$"
      description = "Database size critical threshold (bytes)"
    }
    "--warn-latency" = {
      value = "$postgres_health_warn_latency$"
      description = "Query latency warning threshold (ms)"
    }
    "--crit-latency" = {
      value = "$postgres_health_crit_latency$"
      description = "Query latency critical threshold (ms)"
    }
    "--warn-cache" = {
      value = "$postgres_health_warn_cache$"
      description = "Cache hit ratio warning threshold (%, lower is worse)"
    }
    "--crit-cache" = {
      value = "$postgres_health_crit_cache$"
      description = "Cache hit ratio critical threshold (%, lower is worse)"
    }
  }

  // Defaults — override via host or service custom vars
  vars.postgres_health_container = "odoo-db"
  vars.postgres_health_user = "odoo"
  vars.postgres_health_db = "odoo"
  vars.postgres_health_warn_conn = 35
  vars.postgres_health_crit_conn = 45
  vars.postgres_health_warn_size = 5368709120      // 5 GB
  vars.postgres_health_crit_size = 10737418240     // 10 GB
  vars.postgres_health_warn_latency = 100          // ms (includes docker exec overhead)
  vars.postgres_health_crit_latency = 500          // ms
  vars.postgres_health_warn_cache = 90             // % (below this = warning)
  vars.postgres_health_crit_cache = 80             // % (below this = critical)
}
