# =============================================================================
# PostgreSQL 16 Configuration — Tuned for 10-user Odoo workload
# =============================================================================
# Requirement: PG-02
# Sized for: ~1.2GB container memory limit, 10 concurrent users

# Connection settings
listen_addresses = '*'
max_connections = 50
superuser_reserved_connections = 3

# Memory (tuned for 1.2GB container limit)
shared_buffers = 256MB
work_mem = 8MB
maintenance_work_mem = 128MB
effective_cache_size = 768MB

# WAL configuration
wal_buffers = 16MB
min_wal_size = 80MB
max_wal_size = 1GB
checkpoint_completion_target = 0.9

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Locale
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
