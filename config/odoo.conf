[options]
; =============================================================================
; Odoo Configuration — Tuned for 10-user workload on s-2vcpu-4gb
; =============================================================================
; Requirements: ODOO-02, ODOO-03, ODOO-05

; Database connection (Docker service name)
db_host = db
db_port = 5432
db_user = DB_USER_PLACEHOLDER
db_password = DB_PASSWORD_PLACEHOLDER
db_name = DB_NAME_PLACEHOLDER
db_maxconn = 32

; ODOO-03: Disable database manager
list_db = False

; ODOO-05: Admin master password (set by deploy script from .env ODOO_ADMIN_PASSWORD)
; This value is replaced during deployment — do not change here.
admin_passwd = ADMIN_PASSWORD_PLACEHOLDER

; ODOO-04: Filestore on Block Storage Volume
data_dir = /var/lib/odoo

; Custom addons path — host-mounted at /opt/odoo/custom-addons
; Custom path listed first so custom/enterprise modules take precedence
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; ODOO-02: Worker configuration for 10 users
; Rule of thumb: workers = (2 * CPU) + 1, capped for available RAM
; With 2 vCPU and ~2GB container limit: 3 workers + 1 cron
workers = 3
max_cron_threads = 1

; Memory limits per worker (ODOO-02)
; limit_memory_soft: worker recycled after exceeding (768MB)
; limit_memory_hard: worker killed if exceeding (1024MB)
limit_memory_soft = 805306368
limit_memory_hard = 1073741824

; Time limits per worker
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1

; Proxy mode (behind Nginx reverse proxy)
proxy_mode = True

; Logging
logfile = False
log_level = info

; Server interface
; In Odoo 17+, xmlrpc was renamed to http and longpolling to gevent
http_interface = 0.0.0.0
http_port = 8069
gevent_port = 8072
