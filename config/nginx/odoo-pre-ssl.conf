# =============================================================================
# Nginx Pre-SSL Configuration — Temporary for Certbot HTTP-01 Challenge
# =============================================================================
# Deployed first by scripts/04-setup-nginx.sh, replaced after cert issuance.
# Serves only port 80 with .well-known/acme-challenge for Let's Encrypt.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Everything else returns 503 during initial setup
    location / {
        return 503 "Service temporarily unavailable - SSL setup in progress";
        add_header Content-Type text/plain;
    }
}
