# =============================================================================
# Nginx Multi-Domain SSL Configuration — Odoo Reverse Proxy
# =============================================================================
# Requirements: PROXY-01, PROXY-03, PROXY-04
#
# Template placeholders (replaced by scripts/ops/set-domain.sh):
#   PRIMARY_DOMAIN  — primary FQDN serving Odoo (e.g., portal.loodon.com)
#   ALIAS_DOMAIN    — old/alias FQDN that 301-redirects to primary
#   CERT_NAME       — certbot certificate name (directory under /etc/letsencrypt/live/)
#
# Server blocks:
#   1. HTTP catch-all  — redirects both domains to https://PRIMARY_DOMAIN
#   2. Primary HTTPS   — full reverse proxy to Odoo
#   3. Alias redirect  — 301 redirects ALIAS_DOMAIN to PRIMARY_DOMAIN
# =============================================================================

# Upstream definitions
upstream odoo {
    server 127.0.0.1:8069;
}

upstream odoo-chat {
    server 127.0.0.1:8072;
}

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect (both domains)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name PRIMARY_DOMAIN ALIAS_DOMAIN;

    # Certbot ACME challenge (renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all HTTP traffic to primary domain over HTTPS
    location / {
        return 301 https://PRIMARY_DOMAIN$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Primary HTTPS server — serves Odoo
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name PRIMARY_DOMAIN;

    # SSL certificate paths (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/CERT_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CERT_NAME/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # Hide Nginx version from Server header
    server_tokens off;

    # Strip duplicate headers that Odoo also sets — Nginx is the single source
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;

    # --- Security Headers ---

    # PROXY-03: HSTS — main domain only, no includeSubDomains
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection (Odoo uses iframes internally, SAMEORIGIN allows that)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — permissive enough for Odoo's inline JS/CSS
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'self';" always;

    # Prevent information leakage
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # --- Proxy settings ---

    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Proxy buffers for large Odoo responses
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # Client body size (file uploads)
    client_max_body_size 100m;

    # --- Route blocking ---

    # PROXY-04: Block database manager routes
    location ~ ^/web/database {
        return 403;
    }

    # --- Application routes ---

    # Longpolling (Odoo bus/websocket)
    location /websocket {
        proxy_pass http://odoo-chat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests -> Odoo
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/json application/javascript;
    gzip_min_length 1000;

    # Access and error logs
    access_log /var/log/nginx/odoo-access.log;
    error_log /var/log/nginx/odoo-error.log;
}

# ---------------------------------------------------------------------------
# Alias domain — 301 redirect to primary
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ALIAS_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/CERT_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CERT_NAME/privkey.pem;

    # Minimal SSL config for redirect-only block
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://PRIMARY_DOMAIN$request_uri;
}
